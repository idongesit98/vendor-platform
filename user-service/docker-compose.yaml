services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3001:3001"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3001/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      user-db:
        condition: service_healthy
    restart: always
    networks:
      - food-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  user-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - food-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  mailhog:
    image: axllent/mailpit:latest
    container_name: mailpit
    ports:
      - "1025:1025" # SMTP server (Nodemailer connects here)
      - "8025:8025" # Web UI (View emails in your browser)
    restart: always
    networks:
      - food-network

volumes:
  user-db-data:

networks:
  food-network:
    external: true
 
