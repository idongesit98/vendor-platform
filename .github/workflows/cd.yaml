name: Continuous Deployment

on:
  push:
    branches: [main]
jobs:
  # ---- Detect Changes ----
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      user-service: ${{ steps.filter.outputs.user-service }}
      menuitems-service: ${{ steps.filter.outputs.menuitems-service }}
      order-service: ${{ steps.filter.outputs.order-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      payment: ${{ steps.filter.outputs.payment }}

    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
         filters: |
           api-gateway:
            - 'api-gateway/**'
           user-service:
            - 'user-service/**'
           menu-item-service:
            - 'menu-item-service/**'
           order-service:
            - 'order-service/**'
           notification-service:
            - 'notification-service/**'
          payment:
            - 'payment-service/**'           

  # ── Build & Push Docker Images ───────────────────
  build-and-push:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service, menuitems-service, order-service, notification-service, payment]
    steps:
      - uses: actions/checkout@v4


      - name: Check if service changed
        id: check
        run: |
          CHANGED="${{ needs.detect-changes.outputs[matrix.service] }}"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: Set up Docker Buildx
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/foody-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/foody-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
