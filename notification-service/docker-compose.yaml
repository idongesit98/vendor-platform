services:
  notification-service:
    build:
      context: .
      target: production
    ports:
      - "3004:3004"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      notification-db:
        condition: service_healthy
    restart: always
    networks:
      - food-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  notification-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - notification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - food-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  notification-db-data:

networks:
  food-network:
    external: true