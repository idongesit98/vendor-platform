services:
  redis:
    image: redis:latest
    command: redis-server --requirepass ${REDIS_PASSWORD}
    container_name: payment-redis
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - payment-network

  redis_insight:
    image: redis/redisinsight:latest
    container_name: redis-gui
    ports:
      - "5540:5540"
    restart: always
    depends_on:
      - redis   
    networks:
      - payment-network        

volumes:
  redis_data:

networks:
  payment-network:
    driver: bridge  