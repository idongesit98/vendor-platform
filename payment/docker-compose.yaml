services:
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3005:3005"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3005/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      payment-db:
        condition: service_healthy
    restart: always
    networks:
      - food-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  payment-db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_PAYMENT_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - food-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M


volumes:
  payment-db-data:

networks:
  food-network:
    external: true